<!--Code for the Register page-->


<!DOCTYPE html>
<html lang = "en">

<head>
    
    <!--Used to have the most amount characters so everyone can view it-->
    <meta charset = "UTF-8">

    <!--Tells the web to scale it to the device it is on and on a 1:1 scale so not zoomed in or out-->
    <meta name = "viewport" content = "width= device-width, initial-scale = 1.0">

    <title>JobTracker Register</title>

    <!--Used to download the Inter font to that it works-->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <!--Connects the file to the css file that has the styles-->
    <link rel = "stylesheet" href = "{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h1>Job Tracker</h1>

    <button id = "dark-mode-toggle">Dark Mode Toggle</button>

    <div class = "container">
        <!--Header for the register page-->
        <h2>Register</h2>

        <!--Error message if it is passed in and make it red-->
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}


        <!--POST so it is secure and not showing in the url and action register is for the route used in app.py to register the user-->
        <form method = "POST" action = "/register">

            <!-- Label gives and id then tells the user what it is for -->
            <label for = "username" >Username:</label>
            <br>
            <!--Where the input takes place id needs to match for, name is the key for when the form is submitted and what the input is under-->
            <input type = "text" id = "username" name  = "username" required>
            <br>
            <!-- Label for the password-->
            <label for = "password" >Password:</label>
            <br>
            <!--Type as password makes it to were it shows up as dots so no one can see whaty is typed-->
            <input type = "password" id = "password" name = "password" required>
            <br>

            <!-- Button to submit the form-->
            <button type = "submit">Register</button>

        </form>


        <!--Link for if they already have an account-->
        <p>Already have an account? <a href = "/login">Login here</a></p>






    </div>

    <script>

        //If the theme was already dark add it to this page
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }

        //find the element dark mode and listen for a click
        document.getElementById("dark-mode-toggle").addEventListener("click", function() {
            
            //Change it to what the oppisite is
            document.body.classList.toggle("dark");

            //If it is dark then set as dark
            if (document.body.classList.contains("dark")) {
                localStorage.setItem("theme", "dark");
            } 
            
            //It is light so make the colors root
            else {
                localStorage.setItem("theme", "light");
            }
            
        });
    </script>
    
</body>
</html>
